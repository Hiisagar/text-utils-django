<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 700px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 6px rgba(79, 172, 254, 0.4);
        }

        /* options grid */

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .options label {
            background: #f5f7ff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .options label:hover {
            background: #e8edff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2f8cf0;
            transform: scale(1.02);
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Text Analyzer</h1>

        <form action="/analyzer" method="get">

            <textarea name="text" placeholder="Enter your text here..."></textarea>

            <div class="options">

                <label>
                    <input type="checkbox" name="removepunc">
                    Remove Punctuation
                </label>

                <label>
                    <input type="checkbox" name="fullcaps">
                    UPPERCASE
                </label>

                <label>
                    <input type="checkbox" name="newlineremover">
                    New Line Remover
                </label>

                <label>
                    <input type="checkbox" name="spaceremover">
                    Space Remover
                </label>

                <label>
                    <input type="checkbox" name="wordcount">
                    Character Count
                </label>

            </div>

            <button type="submit">Analyze Text</button>

        </form>

    </div>

</body>

</html>
